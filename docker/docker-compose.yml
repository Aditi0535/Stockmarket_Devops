services:
  mongo:
    image: mongo:7
    container_name: stockmarket-mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile

    container_name: stockmarket-backend
    restart: unless-stopped

    ports:
      - "5001:5000"

    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/stockmarket
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production

    depends_on:
      mongo:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ../app/frontend
      dockerfile: Dockerfile

    container_name: stockmarket-frontend
    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongo_data: