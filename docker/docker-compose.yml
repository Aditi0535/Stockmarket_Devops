version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: stockmarket-mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile

    container_name: stockmarket-backend
    restart: unless-stopped

    ports:
      - "5001:5000"

    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/stockmarket
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production

    depends_on:
      - mongo

  frontend:
    build:
      context: ../app/frontend
      dockerfile: Dockerfile

    container_name: stockmarket-frontend
    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  mongo_data: